<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>Sign Up New User</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- Bootstrap Icons CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    </head>

    <body>
        <div class="container mt-4">
            <h2><i class="bi bi-person-add"></i> Sign Up a New User</h2>
            <p class=" text-muted">Fill in the form to sign up a new user.</p>
            <form th:action="@{/login/add}" method="post" th:object="${user}">
                <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                    Please fix the errors below and try again.
                </div>

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person-fill me-1"></i>Username <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}"
                        th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : (${!#strings.isEmpty(user.name)} ? 'is-valid' : '')"
                        required autofocus>
                    <!-- Error message for invalid input -->
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    <!-- Valid feedback for correct input -->
                    <div class="valid-feedback" th:unless="${#fields.hasErrors('name')}"
                        th:if="${!#strings.isEmpty(user.name)}">
                        Looks good!</div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-lock-fill me-1"></i>Password <span class="text-danger">*</span>
                    </label>
                    <input type="password" class="form-control" th:field="*{password}"
                        th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : (${!#strings.isEmpty(user.password)} ? 'is-valid' : '')"
                        required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                    </div>
                    <div class="valid-feedback" th:unless="${#fields.hasErrors('password')}"
                        th:if="${!#strings.isEmpty(user.password)}">
                        Looks good!
                    </div>
                    <div class="form-text">Password must be valid</div>
                </div>

                <!-- Role -->
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person-badge"></i> Role <span class="text-danger">*</span>
                    </label>
                    <select class="form-select form-select-sm" aria-label="Small select example" th:field="*{role}">
                        <option value="" selected disabled>Open this select menu</option>
                        <option value="2">USER</option>
                        <option value="1">ADMIN</option>
                    </select>
                    <div class="form-text">Select your role.</div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary"><i class="bi bi-person-add"></i> Register User</button>
                <a href="/login" class="btn btn-danger"><i class="bi bi-arrow-left-circle me-2"></i>Back to Login</a>
            </form>

            <!-- <div th:if="${error}" class="alert alert-danger mt-3" role="alert">
                <span th:text="${error}">Error while adding new user</span>
            </div> -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}">User already exists!</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <p class="small text-secondary mt-4 mb-0">By Carlos Vinicius do Carmo Cunha</p>
        </div>
    </body>

</html>

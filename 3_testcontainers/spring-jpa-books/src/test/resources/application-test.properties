# Disable Flyway during tests
spring.flyway.enabled=false
# Disable Docker Compose during tests
spring.docker.compose.enabled=false
# Note: do NOT set spring.datasource.driver-class-name here.
# - Tests using @ServiceConnection (e.g. BookRepositoryUsingSpringTestContainersSupportTest) have their
#   datasource fully auto-configured by Spring Boot from the MySQLContainer bean — no driver override needed.
# - Tests using the Testcontainers Magic URL (e.g. MagicURLBookRepositoryTest) set their own
#   spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver via @TestPropertySource,
#   keeping each test self-contained and avoiding conflicts between the two approaches.

# In other words:
#  1. @ServiceConnection tests get their datasource fully wired from the MySQLContainer bean — no driver property needed.
#  2. Magic URL tests must set ContainerDatabaseDriver themselves because Spring Boot's URL detection doesn't recognize jdbc:tc:
#  3. Setting it in this shared application-test.properties would be wrong — it would leak into other @ServiceConnection tests where it doesn't belong, coupling the two independent

# Determines what Hibernate should do with the database schema at startup
# Don't touch the schema - I'll handle it myself
spring.jpa.hibernate.ddl-auto=none

# Determines whether to initialize the database using schema/data SQL scripts
# tells Spring Boot: Always run my initialization scripts
spring.sql.init.mode=always
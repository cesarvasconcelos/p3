services:
    # From the book "Spring Microservices in Action" (2nd Edition)
    # "Applies a label to each service launched. This becomes the DNS entry for the Docker instance
    # when it starts, which is how other services access it.""
    # From the book "Microservices with Spring Boot and Spring Cloud (Magnus Larsson, 4th Edition)
    # "The name of the microservice. This will also be the hostname of the container in the internal
    # Docker network."
    mysql:
        image: 'mysql:8.1'
        container_name: db
        volumes:
            - vol_books:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        ports:
            - '3306:3306'
        healthcheck:
            # Referencia do Compose: https://docs.docker.com/reference/compose-file/services/#healthcheck
            # Referencia do Docker HEALTHCHECK: https://docs.docker.com/reference/dockerfile/#healthcheck
            # `test` e o comando executado dentro do container do MySQL para verificar se o banco
            # esta saudavel. Aqui, `mysqladmin ping -h localhost` testa se o servidor MySQL que
            # esta rodando no proprio container esta respondendo as requisicoes.
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            # `interval` = o Docker executa o health check periodicamente a cada 10 segundos
            # enquanto o container estiver rodando.
            interval: 10s
            # `timeout` = cada execucao do comando de health check pode levar no maximo 5
            # segundos; se passar disso, aquela execucao conta como falha.
            timeout: 5s
            # `retries` = o container so vira unhealthy depois de 3 falhas consecutivas do
            # health check.
            retries: 3
            # `start_period` = se estivesse configurado, daria um tempo inicial de tolerancia
            # para o container terminar a inicializacao antes de o Docker considerar as falhas
            # do health check na contagem de retries.
        networks:
            - bookstore-network
    bookstore-app:
        image: bookstore-app:1.0
        container_name: bookstore
        build: .
        depends_on:
            mysql:
                condition: service_healthy
        ports:
            - '8080:8080'
        environment:
            SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
            SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
            SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
        networks:
            - bookstore-network
volumes:
    vol_books:
        name: "vol_books"
networks:
    bookstore-network:
        name: "bookstore-network"
        driver: bridge
